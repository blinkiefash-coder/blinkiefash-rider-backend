<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlinkieFash — Dark Store Orders</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f0fdf4; min-height: 100vh; color: #0f172a; }

    header {
      background: #166534; color: white; padding: 16px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 700; }
    header span { font-size: 13px; opacity: .75; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    /* Search bar */
    .search-card {
      background: white; border-radius: 16px; padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
      margin-bottom: 24px;
    }
    .search-card label { font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 4px; }
    .search-card input, .search-card select {
      border: 1.5px solid #d1d5db; border-radius: 10px; padding: 10px 14px;
      font-size: 14px; outline: none; width: 240px;
    }
    .search-card input:focus, .search-card select:focus { border-color: #16a34a; }
    .btn {
      background: #16a34a; color: white; border: none; border-radius: 10px;
      padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .btn:hover { background: #15803d; }
    .btn:disabled { background: #86efac; cursor: not-allowed; }
    .btn-outline {
      background: white; color: #16a34a; border: 1.5px solid #16a34a;
    }
    .btn-outline:hover { background: #f0fdf4; }

    /* Stats row */
    .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat-card {
      background: white; border-radius: 12px; padding: 14px 20px;
      flex: 1; min-width: 140px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .stat-card .num { font-size: 28px; font-weight: 800; color: #166534; }
    .stat-card .lbl { font-size: 12px; color: #6b7280; margin-top: 2px; }

    /* Orders */
    .orders-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .orders-header h2 { font-size: 17px; font-weight: 700; }
    .order-count { font-size: 13px; color: #6b7280; }

    .order-card {
      background: white; border-radius: 14px; padding: 16px 18px;
      margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
      border-left: 4px solid #d1d5db;
    }
    .order-card.pending    { border-left-color: #f59e0b; }
    .order-card.confirmed  { border-left-color: #3b82f6; }
    .order-card.preparing  { border-left-color: #8b5cf6; }
    .order-card.dispatched { border-left-color: #06b6d4; }
    .order-card.delivered  { border-left-color: #16a34a; }
    .order-card.cancelled  { border-left-color: #ef4444; }

    .order-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
    }
    .order-id { font-size: 13px; color: #6b7280; font-family: monospace; }
    .order-customer { font-weight: 700; font-size: 15px; }
    .order-phone { font-size: 13px; color: #6b7280; }
    .order-time { font-size: 12px; color: #9ca3af; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 600; text-transform: capitalize;
    }
    .badge.pending    { background: #fef9c3; color: #92400e; }
    .badge.confirmed  { background: #dbeafe; color: #1e40af; }
    .badge.preparing  { background: #ede9fe; color: #5b21b6; }
    .badge.dispatched { background: #cffafe; color: #0e7490; }
    .badge.delivered  { background: #dcfce7; color: #166534; }
    .badge.cancelled  { background: #fee2e2; color: #991b1b; }

    .order-address {
      font-size: 13px; color: #374151;
      background: #f8fafc; border-radius: 8px; padding: 8px 12px;
      margin-bottom: 10px;
    }
    .order-address .addr-icon { color: #16a34a; margin-right: 6px; }

    .items-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .items-table th {
      text-align: left; color: #6b7280; font-weight: 600;
      border-bottom: 1px solid #e5e7eb; padding: 6px 8px;
    }
    .items-table td { padding: 6px 8px; border-bottom: 1px solid #f3f4f6; }
    .items-table tr:last-child td { border-bottom: none; }

    .order-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px; flex-wrap: wrap; gap: 8px;
    }
    .order-total { font-weight: 700; font-size: 15px; }
    .status-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .status-btn {
      padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid; transition: all .15s;
    }
    .status-btn.confirm   { border-color: #3b82f6; color: #3b82f6; background: white; }
    .status-btn.prepare   { border-color: #8b5cf6; color: #8b5cf6; background: white; }
    .status-btn.dispatch  { border-color: #06b6d4; color: #06b6d4; background: white; }
    .status-btn.deliver   { border-color: #16a34a; color: #16a34a; background: white; }
    .status-btn.cancel    { border-color: #ef4444; color: #ef4444; background: white; }
    .status-btn:hover     { opacity: .8; }

    /* States */
    .empty-state {
      text-align: center; padding: 60px 20px; color: #9ca3af;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    .loading {
      text-align: center; padding: 40px; color: #6b7280; font-size: 15px;
    }
    .spinner {
      display: inline-block; width: 22px; height: 22px;
      border: 3px solid #d1d5db; border-top-color: #16a34a;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .store-badge {
      background: #dcfce7; color: #166534; border-radius: 8px;
      padding: 4px 12px; font-size: 13px; font-weight: 600;
      display: inline-block; margin-left: 12px;
    }
    .refresh-time { font-size: 12px; color: #9ca3af; margin-top: 4px; }

    @media (max-width: 600px) {
      .search-card input, .search-card select { width: 100%; }
      .stats { gap: 8px; }
      .stat-card { min-width: 120px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>⚡ BlinkieFash Dark Store</h1>
    <span>Order Management Dashboard</span>
  </div>
</header>

<div class="container">

  <!-- Search -->
  <div class="search-card">
    <div>
      <label for="storeSelect">Select Store</label>
      <select id="storeSelect">
        <option value="">-- Loading stores... --</option>
      </select>
    </div>
    <div>
      <label for="storeInput">Or enter Store ID directly</label>
      <input id="storeInput" type="text" placeholder="Paste store UUID..." />
    </div>
    <div>
      <label for="statusFilter">Filter by Status</label>
      <select id="statusFilter">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="preparing">Preparing</option>
        <option value="dispatched">Dispatched</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
    <div>
      <button class="btn" id="loadBtn" onclick="loadOrders()">Load Orders</button>
    </div>
    <div>
      <button class="btn btn-outline" onclick="toggleAutoRefresh()" id="autoBtn">▶ Auto Refresh</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="statsRow" style="display:none">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Total Orders</div></div>
    <div class="stat-card"><div class="num" id="statPending" style="color:#f59e0b">0</div><div class="lbl">Pending</div></div>
    <div class="stat-card"><div class="num" id="statPreparing" style="color:#8b5cf6">0</div><div class="lbl">Preparing</div></div>
    <div class="stat-card"><div class="num" id="statDispatched" style="color:#06b6d4">0</div><div class="lbl">Dispatched</div></div>
    <div class="stat-card"><div class="num" id="statDelivered">0</div><div class="lbl">Delivered</div></div>
  </div>

  <!-- Orders list -->
  <div id="ordersHeader" class="orders-header" style="display:none">
    <div>
      <h2>Orders <span id="storeBadge" class="store-badge"></span></h2>
      <div class="refresh-time" id="refreshTime"></div>
    </div>
    <span class="order-count" id="orderCount"></span>
  </div>
  <div id="ordersContainer">
    <div class="empty-state">
      <div class="icon">🏪</div>
      <p>Select a dark store and click <strong>Load Orders</strong></p>
    </div>
  </div>

</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const API = window.location.hostname === 'localhost' || window.location.hostname.startsWith('192.')
    ? `http://${window.location.hostname}:5000`
    : 'https://blinkiefash.onrender.com';

  let autoInterval = null;
  let currentStoreId = null;
  let currentStoreName = '';

  // ── Load store list on page open ─────────────────────────────────────────
  async function loadStores() {
    try {
      const res = await fetch(`${API}/api/checkout/darkstores`);
      const data = await res.json();
      const sel = document.getElementById('storeSelect');
      sel.innerHTML = '<option value="">-- Select a store --</option>';
      (data.stores || []).forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.name} (${s.city})`;
        sel.appendChild(opt);
      });
    } catch (_) {
      document.getElementById('storeSelect').innerHTML =
        '<option value="">-- Could not load stores --</option>';
    }
  }

  // ── Load orders ───────────────────────────────────────────────────────────
  async function loadOrders() {
    const selEl  = document.getElementById('storeSelect');
    const inputEl = document.getElementById('storeInput');
    const storeId = inputEl.value.trim() || selEl.value;
    if (!storeId) { alert('Please select or enter a store ID'); return; }

    currentStoreId = storeId;
    currentStoreName = selEl.options[selEl.selectedIndex]?.textContent || storeId.substring(0, 8);

    const status  = document.getElementById('statusFilter').value;
    const btn     = document.getElementById('loadBtn');
    btn.disabled  = true;
    btn.textContent = 'Loading…';

    const container = document.getElementById('ordersContainer');
    container.innerHTML = '<div class="loading"><span class="spinner"></span>Fetching orders…</div>';

    try {
      let url = `${API}/api/checkout/orders/darkstore/${storeId}`;
      if (status) url += `?status=${status}`;

      const res  = await fetch(url);
      const data = await res.json();
      if (!data.success) throw new Error(data.message || 'Server error');

      renderOrders(data.orders || []);
    } catch (err) {
      container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${err.message}</p></div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Load Orders';
      document.getElementById('refreshTime').textContent =
        'Last updated: ' + new Date().toLocaleTimeString();
    }
  }

  function renderOrders(orders) {
    const container = document.getElementById('ordersContainer');
    const statsRow  = document.getElementById('statsRow');
    const header    = document.getElementById('ordersHeader');
    const badge     = document.getElementById('storeBadge');
    const countEl   = document.getElementById('orderCount');

    badge.textContent = currentStoreName;
    statsRow.style.display = 'flex';
    header.style.display   = 'flex';
    countEl.textContent    = `${orders.length} order${orders.length !== 1 ? 's' : ''}`;

    // Stats
    const cnt = { pending:0, confirmed:0, preparing:0, dispatched:0, delivered:0, cancelled:0 };
    orders.forEach(o => { if (cnt[o.status] !== undefined) cnt[o.status]++; });
    document.getElementById('statTotal').textContent    = orders.length;
    document.getElementById('statPending').textContent  = cnt.pending;
    document.getElementById('statPreparing').textContent= cnt.preparing + cnt.confirmed;
    document.getElementById('statDispatched').textContent = cnt.dispatched;
    document.getElementById('statDelivered').textContent  = cnt.delivered;

    if (!orders.length) {
      container.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>No orders found for this store.</p></div>';
      return;
    }

    container.innerHTML = orders.map(o => orderCard(o)).join('');
  }

  function orderCard(o) {
    const items = (o.items || []).map(it => `
      <tr>
        <td>${escHtml(it.product_name || '-')}</td>
        <td>${escHtml(it.size || '-')}</td>
        <td>${escHtml(it.color || '-')}</td>
        <td>${it.quantity}</td>
        <td>₹${Number(it.price).toLocaleString('en-IN')}</td>
      </tr>`).join('');

    const statusActions = statusButtons(o.id, o.status);
    const timeAgo       = formatTime(o.created_at);

    return `
    <div class="order-card ${o.status}" id="order-${o.id}">
      <div class="order-top">
        <div>
          <div class="order-customer">${escHtml(o.customer_name || 'Customer')}</div>
          <div class="order-phone">📞 ${escHtml(o.customer_phone || '')}</div>
          <div class="order-id">Order: ${o.id.substring(0,8).toUpperCase()}</div>
        </div>
        <div style="text-align:right">
          <span class="badge ${o.status}">${o.status}</span>
          <div class="order-time">${timeAgo}</div>
          <div style="font-size:13px;color:#374151;margin-top:4px">${escHtml(o.payment_method?.toUpperCase() || 'COD')}</div>
        </div>
      </div>

      <div class="order-address">
        <span class="addr-icon">📍</span>
        ${escHtml(o.address_line)}, ${escHtml(o.city)} - ${escHtml(o.pincode)}
      </div>

      <table class="items-table">
        <thead><tr><th>Product</th><th>Size</th><th>Color</th><th>Qty</th><th>Price</th></tr></thead>
        <tbody>${items}</tbody>
      </table>

      <div class="order-footer">
        <div class="order-total">Total: ₹${Number(o.total_amount).toLocaleString('en-IN')}</div>
        <div class="status-actions">${statusActions}</div>
      </div>
    </div>`;
  }

  function statusButtons(orderId, currentStatus) {
    const flow = [
      { val: 'confirmed',  label: '✓ Confirm',   cls: 'confirm'  },
      { val: 'preparing',  label: '👨‍🍳 Prepare',  cls: 'prepare'  },
      { val: 'dispatched', label: '🛵 Dispatch',  cls: 'dispatch' },
      { val: 'delivered',  label: '✅ Delivered', cls: 'deliver'  },
      { val: 'cancelled',  label: '✗ Cancel',     cls: 'cancel'   },
    ];
    return flow
      .filter(s => s.val !== currentStatus)
      .map(s => `<button class="status-btn ${s.cls}"
                   onclick="updateStatus('${orderId}', '${s.val}')">${s.label}</button>`)
      .join('');
  }

  async function updateStatus(orderId, status) {
    try {
      const res = await fetch(`${API}/api/checkout/orders/${orderId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      const data = await res.json();
      if (data.success) {
        // Refresh just this card by reloading all
        loadOrders();
      } else {
        alert(data.message || 'Failed to update status');
      }
    } catch (err) {
      alert('Connection error: ' + err.message);
    }
  }

  function toggleAutoRefresh() {
    const btn = document.getElementById('autoBtn');
    if (autoInterval) {
      clearInterval(autoInterval);
      autoInterval = null;
      btn.textContent = '▶ Auto Refresh';
      btn.style.background = 'white';
    } else {
      autoInterval = setInterval(loadOrders, 15000); // every 15s
      btn.textContent = '⏸ Stop Refresh (15s)';
      btn.style.background = '#dcfce7';
      loadOrders();
    }
  }

  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const diff = Math.floor((Date.now() - d.getTime()) / 1000);
    if (diff < 60)  return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    return d.toLocaleTimeString();
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Init
  loadStores();
</script>
</body>
</html>
